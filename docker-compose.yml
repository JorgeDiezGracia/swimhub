services:
  mariadb:
    image: mariadb:11
    container_name: swimhub-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: swimhub
      MYSQL_USER: swimhub
      MYSQL_PASSWORD: swimhub123
    ports:
      - "3306:3306"
    volumes:
      - swimhub_data:/var/lib/mysql
    networks:
      - swimhub-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: swimhub-app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/swimhub
      SPRING_DATASOURCE_USERNAME: swimhub
      SPRING_DATASOURCE_PASSWORD: swimhub123
    ports:
      - "8080:8080"
    networks:
      - swimhub-net

volumes:
  swimhub_data:

networks:
  swimhub-net: