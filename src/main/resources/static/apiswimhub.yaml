openapi: 3.0.1
info:
  title: SwimHub API
  description: |
    API de solo lectura para la gestión de la natación federada en España.
    Permite consultar información sobre nadadores, clubes, federaciones, 
    ligas, pruebas, eventos, registros de tiempo y récords oficiales.
  version: 1.0.0
  contact:
    name: Jorge Diez Gracia

tags:
  - name: communities
    description: Operaciones con comunidades autónomas
  - name: federations
    description: Operaciones con federaciones autonómicas
  - name: leagues
    description: Operaciones con ligas provinciales
  - name: clubs
    description: Operaciones con clubes
  - name: categories
    description: Operaciones con categorías de edad
  - name: swimmers
    description: Operaciones con nadadores
  - name: races
    description: Operaciones con pruebas
  - name: events
    description: Operaciones con eventos y competiciones
  - name: time-records
    description: Operaciones con registros de tiempo
  - name: records
    description: Operaciones con récords oficiales
  - name: auth
    description: Autenticación y generación de tokens JWT

servers:
  - url: 'http://localhost:8081'

security:
  - BearerAuth: []

paths:
  /api/auth/login:
    post:
      tags:
        - auth
      summary: Obtener token JWT
      description: Devuelve un token JWT para autenticarse en la API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                message: "Credenciales incorrectas"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/communities:
    get:
      tags:
        - communities
      summary: Devuelve todas las comunidades autónomas
      description: Devuelve un listado completo de las comunidades autónomas registradas
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Community'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/communities/{id}:
    get:
      tags:
        - communities
      summary: Devuelve una comunidad autónoma
      description: Devuelve la comunidad autónoma con el identificador indicado
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Community'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/federations:
    get:
      tags:
        - federations
      summary: Devuelve todas las federaciones
      description: Devuelve un listado paginado de las federaciones autonómicas registradas
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageFederation'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/federations/{id}:
    get:
      tags:
        - federations
      summary: Devuelve una federación
      description: Devuelve la federación con el identificador indicado
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Federation'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/federations/{id}/clubs:
    get:
      tags:
        - federations
      summary: Devuelve los clubes de una federación
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Club'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/federations/{id}/events:
    get:
      tags:
        - federations
      summary: Devuelve los eventos de una federación
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leagues:
    get:
      tags:
        - leagues
      summary: Devuelve todas las ligas
      description: Devuelve un listado paginado de las ligas provinciales registradas
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageLeague'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leagues/{id}:
    get:
      tags:
        - leagues
      summary: Devuelve una liga
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/League'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/clubs:
    get:
      tags:
        - clubs
      summary: Devuelve todos los clubes
      description: Devuelve un listado paginado de los clubes registrados
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageClub'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/clubs/{id}:
    get:
      tags:
        - clubs
      summary: Devuelve un club
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Club'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/clubs/{id}/swimmers:
    get:
      tags:
        - clubs
      summary: Devuelve los nadadores de un club
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Swimmer'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/categories:
    get:
      tags:
        - categories
      summary: Devuelve todas las categorías
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/categories/{id}:
    get:
      tags:
        - categories
      summary: Devuelve una categoría
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swimmers:
    get:
      tags:
        - swimmers
      summary: Devuelve todos los nadadores
      description: Devuelve un listado paginado de nadadores con filtros opcionales
      parameters:
        - name: gender
          in: query
          required: false
          schema:
            type: string
            example: M
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: clubId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: federationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageSwimmer'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swimmers/{id}:
    get:
      tags:
        - swimmers
      summary: Devuelve un nadador
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Swimmer'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swimmers/{id}/time-records:
    get:
      tags:
        - swimmers
      summary: Devuelve las marcas de un nadador
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swimmers/{id}/records:
    get:
      tags:
        - swimmers
      summary: Devuelve los récords de un nadador
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Record'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/swimmers/{id}/performance:
    get:
      tags:
        - swimmers
      summary: Análisis de tendencias de rendimiento
      description: Devuelve el análisis estadístico de rendimiento de un nadador en una prueba
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: raceId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceTrend'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/races:
    get:
      tags:
        - races
      summary: Devuelve todas las pruebas
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Race'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/races/{id}:
    get:
      tags:
        - races
      summary: Devuelve una prueba
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Race'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events:
    get:
      tags:
        - events
      summary: Devuelve todos los eventos
      description: Devuelve un listado paginado de eventos con filtros opcionales
      parameters:
        - name: federationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: poolType
          in: query
          required: false
          schema:
            type: string
            example: Corta
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEvent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}:
    get:
      tags:
        - events
      summary: Devuelve un evento
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}/time-records:
    get:
      tags:
        - events
      summary: Devuelve las marcas de un evento
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/time-records:
    get:
      tags:
        - time-records
      summary: Devuelve todos los registros de tiempo
      description: Devuelve un listado paginado de registros con filtros opcionales
      parameters:
        - name: swimmerId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: raceId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTimeRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/time-records/{id}:
    get:
      tags:
        - time-records
      summary: Devuelve un registro de tiempo
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/records:
    get:
      tags:
        - records
      summary: Devuelve todos los récords oficiales
      description: Devuelve un listado paginado de récords con filtros opcionales
      parameters:
        - name: gender
          in: query
          required: false
          schema:
            type: string
            example: M
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: federationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: raceId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/records/{id}:
    get:
      tags:
        - records
      summary: Devuelve un récord oficial
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      description: Identificador del recurso
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Número de página (empieza en 0)
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
      description: Tamaño de página
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        default: id
      description: Campo de ordenación

  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzM4NCJ9...

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: "Resource not found with id: 99"

    Community:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Aragón
        code:
          type: string
          example: AR

    Federation:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Federación Aragonesa de Natación
        website:
          type: string
          example: www.fanatacion.es
        community:
          $ref: '#/components/schemas/Community'

    League:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Liga Zaragoza
        province:
          type: string
          example: Zaragoza
        federation:
          $ref: '#/components/schemas/Federation'

    Club:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: CN Zaragoza
        city:
          type: string
          example: Zaragoza
        email:
          type: string
          example: cnzaragoza@email.com
        league:
          $ref: '#/components/schemas/League'

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Benjamín
        minAge:
          type: integer
          example: 6
        maxAge:
          type: integer
          example: 8

    Swimmer:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Carlos
        surname:
          type: string
          example: García
        birthDate:
          type: string
          format: date
          example: 2005-03-15
        gender:
          type: string
          example: M
        licenseNumber:
          type: string
          example: AR-001
        club:
          $ref: '#/components/schemas/Club'
        category:
          $ref: '#/components/schemas/Category'

    Race:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        style:
          type: string
          example: Libre
        distance:
          type: integer
          example: 50
        poolType:
          type: string
          example: Corta

    Event:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Campeonato Aragonés Infantil 2025
        date:
          type: string
          format: date
          example: 2025-11-15
        location:
          type: string
          example: Zaragoza
        poolType:
          type: string
          example: Corta
        federation:
          $ref: '#/components/schemas/Federation'

    TimeRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        time:
          type: number
          format: double
          example: 28.45
        date:
          type: string
          format: date
          example: 2025-11-15
        status:
          type: string
          example: oficial
        swimmer:
          $ref: '#/components/schemas/Swimmer'
        race:
          $ref: '#/components/schemas/Race'
        event:
          $ref: '#/components/schemas/Event'

    Record:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        time:
          type: number
          format: double
          example: 27.90
        date:
          type: string
          format: date
          example: 2024-03-10
        gender:
          type: string
          example: M
        race:
          $ref: '#/components/schemas/Race'
        category:
          $ref: '#/components/schemas/Category'
        federation:
          $ref: '#/components/schemas/Federation'
        swimmer:
          $ref: '#/components/schemas/Swimmer'

    PerformanceTrend:
      type: object
      properties:
        swimmerId:
          type: integer
          format: int64
          example: 1
        swimmerName:
          type: string
          example: Carlos
        swimmerSurname:
          type: string
          example: García
        raceId:
          type: integer
          format: int64
          example: 1
        raceDescription:
          type: string
          example: "Libre 50m Corta"
        bestTime:
          type: number
          format: double
          example: 28.45
        worstTime:
          type: number
          format: double
          example: 29.10
        averageTime:
          type: number
          format: double
          example: 28.77
        firstTime:
          type: number
          format: double
