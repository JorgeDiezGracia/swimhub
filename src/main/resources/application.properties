# Base de datos
spring.datasource.url=jdbc:mariadb://localhost:3306/swimhub?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=swimhub
spring.datasource.password=swimhub123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=clave-super-secreta-swimhub-2024-larga-minimo-256-bits
jwt.expiration=86400000

spring.jpa.open-in-view=false
